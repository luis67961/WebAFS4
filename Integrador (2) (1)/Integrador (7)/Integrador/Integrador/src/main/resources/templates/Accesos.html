<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
    <link rel="stylesheet" th:href="@{/estilos/accesos.css}">



    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


    <div class="contenido-admin">

        <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
        <div th:replace="fragmentos/modalAdmin :: modalAdmin"></div>


        <!-- ================= HEADER ADMINISTRADORES ================= -->

        <div class=" border-0 shadow-sm rounded-4 mb-4  accesos">
            <div class="card-body py-4 dahs">

                <!-- HEADER PERSONALIZADO -->
                <div class="admin-header rounded-4 p-4 mb-4 ">

                    <div class="text-center text-white">

                        <div class="icon-admin mb-3">

                            <i class="bi bi-shield-lock-fill"></i>

                        </div>


                        <h3 class="fw-bold mb-1">
                            Administradores
                        </h3>


                        <p class="mb-0 opacity-75">
                            Gestiona los administradores del sistema
                        </p>

                    </div>


                </div>



                <!-- BOTONES -->

                <div class="d-flex flex-wrap justify-content-center gap-3">


                    <button type="button" class="btn btn-success btn-lg rounded-pill px-4 shadow-sm"
                        data-bs-toggle="modal" data-bs-target="#modalAgregarAdmin">

                        <i class="bi bi-person-plus-fill me-2"></i>
                        Agregar

                    </button>



                    <button type="button" class="btn btn-warning btn-lg rounded-pill px-4 shadow-sm text-dark"
                        data-bs-toggle="modal" data-bs-target="#modalActualizarAdmin">

                        <i class="bi bi-pencil-square me-2"></i>
                        Actualizar

                    </button>



                    <button type="button" class="btn btn-danger btn-lg rounded-pill px-4 shadow-sm"
                        data-bs-toggle="modal" data-bs-target="#modalEliminarAdmin">

                        <i class="bi bi-trash-fill me-2"></i>
                        Eliminar

                    </button>


                </div>


            </div>
            <!-- ================= CONTENIDO DINÁMICO ================= -->

            <div class="row g-4">


                <!-- ================= ADMINISTRADORES CONECTADOS ================= -->

                <div class="col-lg-5 bg-transparent">

                    <div class="card card-conectados shadow-sm rounded-4 h-100  bg-transparent border-success mb-3">

                        <div class="card-header border-0 py-3 ">
                            <h5 class="fw-bold mb-0">
                                <i class="bi bi-wifi text-success me-2"></i>
                                Administradores conectados
                            </h5>
                        </div>


                        <div class="card-body" id="listaAdministradores">


                            <!-- JS carga los administradores aquí -->


                        </div>


                    </div>

                </div>




                <!-- ================= HISTORIAL ================= -->

                <div class="col-lg-7">

                    <div class="card card-historial shadow-sm rounded-4 h-100 bg-transparent border border-success">


                        <div class="card-header border-0 py-3 bg-transparent">

                            <h5 class="fw-bold mb-0 text-white">

                                <i class="bi bi-clock-history text-primary me-2"></i>

                                Historial de actividad

                            </h5>

                        </div>



                        <div class="card-body" id="listaHistorial">

                            <!-- Aquí JS cargará las actividades -->

                        </div>

                    </div>


                </div>


            </div>



        </div>


    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>


    <script th:src="@{/script/administradores.js}"></script>

    <script th:src="@{/script/navAdmin.js}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
