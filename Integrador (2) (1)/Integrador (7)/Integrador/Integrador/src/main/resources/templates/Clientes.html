<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" th:href="@{/estilos/navAdmin.css}">
    <link rel="stylesheet" th:href="@{/estilos/clientes.css}">
</head>

<body>


    <div class="container-fluid">
        <div class="row g-0 min-vh-100">

            <!-- SIDEBAR -->
            <div th:replace="fragmentos/navAdmin :: navAdmin"></div>
            <div th:replace="fragmentos/modalAdmin :: modalAdmin"></div>


            <main class="content">
                <div class="layout">
                    <!-- CARD DE FILTROS -->

                    <!-- CARD DE FILTROS -->
                    <div class="bg-success bg-opacity-10 border border-success rounded-4 shadow-sm p-3 w-100">

                        <div class="mb-3 text-center">
                            <h5 class="text-success fw-bold mb-0">Filtros</h5>
                            <small class="text-white-50">Filtra clientes por rango de fechas</small>
                        </div>

                        <div id="filtroMensaje" class="alert alert-warning d-none py-2 mb-3 text-center"></div>

                        <div class="filtros">

                            <div class="filtro-item">
                                <label class="text-white">Desde:</label>
                                <input type="date" id="filtroDesde" class="form-control form-control-sm rounded-3">
                            </div>

                            <div class="filtro-item">
                                <label class="text-white">Hasta:</label>
                                <input type="date" id="filtroHasta" class="form-control form-control-sm rounded-3">
                            </div>

                            <button class="btn btn-success btn-sm rounded-3" onclick="aplicarFiltros()">
                                Filtrar
                            </button>

                            <button class="btn btn-outline-light btn-sm rounded-3" onclick="quitarFiltros()">
                                Quitar
                            </button>

                        </div>

                    </div>
                    <div class="container mb-4">


                    </div>

                    <h2 class="text-white mb-4">Historial de compras de usuarios (WEB)</h2>

                    <div class="table-container">

                        <div class="table-responsive custom-table-scroll">

                            <table class="table table-dark table-borderless align-middle custom-table">

                                <thead>
                                    <tr>
                                        <th>Cliente</th>
                                        <th>Nivel</th>
                                        <th>Última compra</th>
                                        <th>Total gastado</th>
                                    </tr>
                                </thead>

                                <tbody id="tabla-clientes"></tbody>

                            </table>

                        </div>
                    </div>

                </div>

            </main>
        </div>
    </div>






    <div class="modal fade" id="modalCompras" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white">

                <div class="modal-header">
                    <div>
                        <h5 class="modal-title fw-bold mb-1">HISTORIAL DE COMPRAS</h5>
                        <small class=" fs-6 text-warning">Se mostrará el resumen de pedidos finalizados</small>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>


                <div class="modal-body">

                    <table class="table table-dark table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>DNI registrado</th>
                                <th>Fecha de creación</th>
                                <th>Estado</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-modal-compras"></tbody>
                    </table>

                </div>
                <div class="modal-footer">
                    <strong>Total gastado: <span id="modal-total"></span></strong>
                    <!--  DESCUENTO (OCULTO POR DEFECTO) -->
                    <a id="btnDescuentoWhatsApp" class="btn btn-success d-none" target="_blank">
                        Enviar descuento WhatsApp
                    </a>
                </div>



            </div>
        </div>
    </div>













    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/script/adminClientes.js}"></script>
    <script th:src="@{/script/navAdmin.js}"></script>








</body>

</html>
