<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/estilos/formulario.css}">


</head>

<body>

    <!-- Fondo animado -->
    <div class="wave">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <!-- Contenedor principal -->
    <main class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">

        <section id="contact">


            <a type="button" class="btn btn-outline-success button_base b_3d " th:href="@{/}">
                Cancelar
            </a>



            <!-- Alertas -->
            <div id="alertaLoginAdmin"></div>

            <!-- Encabezado -->
            <div class="card sectionheader">
                <div class="pricing-block-content">
                    <p class="pricing-plan fw-bold text-bold text-white">Animal Feed Solutions</p>
                    <p class=" text-white small">S.A.C. | Sistema interno</p>
                </div>
            </div>

            <!-- Formulario -->
            <article>

                <p class="text-center mb-4 fw-bold text-uppercase text-secondary small  text-white">
                    Ingresa tu correo, contraseña y el código OTP para acceder.
                </p>

                <label for="checkcontact" class="contactbutton">
                    <div class="mail"></div>
                </label>


                <form class="contactform">

                    <!-- Correo -->
                    <div class="input_wrapper">
                        <input type="email" id="emailAdmin" placeholder="Correo electrónico" required>

                        <label for="emailAdmin">
                            EMAIL
                        </label>
                    </div>

                    <!-- Contraseña -->
                    <div class="input_wrapper">
                        <input type="password" id="passwordAdmin" placeholder="Contraseña" required>

                        <label for="passwordAdmin">
                            PASSWORD
                        </label>
                    </div>

                    <!-- OTP -->
                    <div class="input_wrapper">
                        <input type="text" id="codigoAdmin" placeholder="Código de seguridad" required>

                        <label for="codigoAdmin">
                            OTP
                        </label>
                    </div>

                    <!-- btn enviar codigo -->
                    <div class="submit_wrapper" id="btnEnviarCodigo">
                        <input type="button" value="ENVIAR CÓDIGO" onclick="enviarCodigo()">
                    </div>

                    <!-- btn login -->
                    <div class="submit_wrapper" id="btnIngresar" style="display:none;">
                        <input type="button" value="INGRESAR" onclick="validarAdmin()">
                    </div>

                </form>

            </article>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/script/loginRoles.js}"></script>

</body>

</html>
